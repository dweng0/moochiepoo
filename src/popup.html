<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mooch Helper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1f2e;
      color: #e0e6f0;
      width: 550px;
      padding: 16px;
      margin: 0;
    }
    h1 { font-size: 0.95rem; font-weight: 600; margin: 0 0 12px; }
    #btn-container { margin-bottom: 12px; }
    #get-hint-btn {
      padding: 8px 16px;
      background: #3d5afe;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      width: 100%;
    }
    #get-hint-btn:hover:not([disabled]) { background: #5b7afe; }
    #get-hint-btn[disabled] { opacity: 0.5; cursor: not-allowed; }
    #hints { font-size: 0.85rem; line-height: 1.6; color: #c8d0e0; max-height: 400px; overflow-y: auto; }
    #hints p { margin: 4px 0; }
    #hints h1, #hints h2, #hints h3 { color: #e0e6f0; margin: 10px 0 4px; }
    #hints h1 { font-size: 1rem; }
    #hints h2 { font-size: 0.95rem; }
    #hints h3 { font-size: 0.9rem; }
    #hints strong { color: #e0e6f0; }
    #hints em { font-style: italic; color: #a8b4c8; }
    #hints ul { margin: 4px 0; padding-left: 18px; }
    #hints li { margin: 2px 0; }
    #hints pre {
      background: #111520;
      border: 1px solid #2d3748;
      border-radius: 6px;
      padding: 10px 12px;
      margin: 8px 0;
      overflow-x: auto;
      white-space: pre;
    }
    #hints pre code {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.8rem;
      line-height: 1.5;
      color: #68d391;
      background: none;
      padding: 0;
      border: none;
      border-radius: 0;
    }
    #hints code {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.8rem;
      background: #111520;
      color: #68d391;
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid #2d3748;
    }
    .setup-msg { margin: 0; color: #8b95a8; }
    .setup-msg a { color: #5b7afe; text-decoration: none; }
    .setup-msg a:hover { text-decoration: underline; }
    .streaming-indicator { color: #3d5afe; animation: pulse 1s infinite; margin-left: 4px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    #debug-toggle {
      margin-top: 14px;
      font-size: 0.72rem;
      color: #4a5568;
      cursor: pointer;
      user-select: none;
      text-align: center;
    }
    #debug-toggle:hover { color: #6b7a90; }
    #debug {
      display: none;
      margin-top: 8px;
      padding: 10px;
      background: #111520;
      border-radius: 6px;
      font-size: 0.72rem;
      color: #8b95a8;
    }
    .debug-row { margin-bottom: 4px; word-break: break-all; }
    .debug-row b { color: #c8d0e0; }
    #debug button {
      margin-top: 8px;
      padding: 5px 10px;
      background: #2d3748;
      color: #c8d0e0;
      border: 1px solid #4a5568;
      border-radius: 4px;
      font-size: 0.72rem;
      cursor: pointer;
      width: 100%;
    }
    #debug button:hover { background: #3a4a5e; }
    .debug-result {
      margin-top: 8px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #68d391;
      font-size: 0.7rem;
    }
  </style>
</head>
<body>
  <h1>Mooch Helper</h1>
  <div id="btn-container"></div>
  <div id="hints"></div>
  <div id="debug-toggle">▸ debug</div>
  <div id="debug"></div>
  <script src="popup.js"></script>
</body>
</html>
