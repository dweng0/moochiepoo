<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mooch Helper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1f2e;
      color: #e0e6f0;
      width: 360px;
      padding: 16px;
      margin: 0;
    }
    h1 { font-size: 0.95rem; font-weight: 600; margin: 0 0 12px; }
    #btn-container { margin-bottom: 12px; }
    #get-hint-btn {
      padding: 8px 16px;
      background: #3d5afe;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      width: 100%;
    }
    #get-hint-btn:hover:not([disabled]) { background: #5b7afe; }
    #get-hint-btn[disabled] { opacity: 0.5; cursor: not-allowed; }
    #hints { font-size: 0.85rem; line-height: 1.5; color: #c8d0e0; }
    #hints pre { white-space: pre-wrap; word-break: break-word; margin: 0; font-family: inherit; }
    #hints p { margin: 0; }
    #debug-toggle {
      margin-top: 14px;
      font-size: 0.72rem;
      color: #4a5568;
      cursor: pointer;
      user-select: none;
      text-align: center;
    }
    #debug-toggle:hover { color: #6b7a90; }
    #debug {
      display: none;
      margin-top: 8px;
      padding: 10px;
      background: #111520;
      border-radius: 6px;
      font-size: 0.72rem;
      color: #8b95a8;
    }
    .debug-row { margin-bottom: 4px; word-break: break-all; }
    .debug-row b { color: #c8d0e0; }
    #debug button {
      margin-top: 8px;
      padding: 5px 10px;
      background: #2d3748;
      color: #c8d0e0;
      border: 1px solid #4a5568;
      border-radius: 4px;
      font-size: 0.72rem;
      cursor: pointer;
      width: 100%;
    }
    #debug button:hover { background: #3a4a5e; }
    .debug-result {
      margin-top: 8px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #68d391;
      font-size: 0.7rem;
    }
  </style>
</head>
<body>
  <h1>Mooch Helper</h1>
  <div id="btn-container"></div>
  <div id="hints"></div>
  <div id="debug-toggle">▸ debug</div>
  <div id="debug"></div>
  <script src="popup.js"></script>
</body>
</html>
