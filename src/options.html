<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mooch Helper - Settings</title>
  <style>
    body { font-family: sans-serif; padding: 16px; max-width: 480px; }
    h1 { font-size: 1.1rem; margin-bottom: 16px; }
    form { display: flex; flex-direction: column; gap: 12px; }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 0.9rem; }
    input, select { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
    button { padding: 8px 16px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    #status { color: green; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Mooch Helper Settings</h1>
  <form id="options-form">
    <div id="options"></div>
    <button type="submit">Save</button>
    <span id="status"></span>
  </form>
  <script src="options.js"></script>
</body>
</html>
