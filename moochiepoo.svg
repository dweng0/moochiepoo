<svg viewBox="-10 -10 140 140" fill="none" xmlns="http://www.w3.org/2000/svg" width="180" height="180">
  <style>
    @keyframes baby-head-rotate {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    @keyframes baby-ear-wiggle-left {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }
    @keyframes baby-ear-wiggle-right {
      0%, 100% { transform: rotate(4deg); }
      50% { transform: rotate(-4deg); }
    }
    @keyframes baby-eye-blink {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: 0; }
    }
    @keyframes baby-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    .baby-rabbit-head {
      transform-origin: 60px 52px;
      animation: baby-head-rotate 3.5s ease-in-out infinite;
    }
    .baby-ear-left {
      transform-origin: 42px 30px;
      animation: baby-ear-wiggle-left 2.5s ease-in-out infinite;
    }
    .baby-ear-right {
      transform-origin: 78px 30px;
      animation: baby-ear-wiggle-right 2.5s ease-in-out infinite 0.3s;
    }
    .baby-eye {
      animation: baby-eye-blink 5s ease-in-out infinite;
    }
    .baby-body {
      transform-origin: 60px 100px;
      animation: baby-bounce 2s ease-in-out infinite;
    }
  </style>

  <defs>
    <linearGradient id="baby-rabbit-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#fdba74" />
    </linearGradient>
    <linearGradient id="baby-blush" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5" />
      <stop offset="100%" stop-color="#fecaca" />
    </linearGradient>
  </defs>

  <g class="baby-body">
    <!-- Tiny Body -->
    <ellipse cx="60" cy="100" rx="18" ry="14" fill="url(#baby-rabbit-gradient)" opacity="0.8" />

    <!-- Tiny Belly -->
    <ellipse cx="60" cy="100" rx="11" ry="8" fill="white" opacity="0.3" />

    <!-- Diaper / nappy -->
    <ellipse cx="60" cy="106" rx="14" ry="8" fill="white" opacity="0.5" />

    <!-- Tiny Feet -->
    <ellipse cx="52" cy="112" rx="6" ry="4.5" fill="url(#baby-rabbit-gradient)" opacity="0.9" />
    <ellipse cx="68" cy="112" rx="6" ry="4.5" fill="url(#baby-rabbit-gradient)" opacity="0.9" />

    <!-- Tiny Toe details -->
    <ellipse cx="50" cy="112" rx="1.5" ry="1" fill="#111827" opacity="0.3" />
    <ellipse cx="54" cy="112" rx="1.5" ry="1" fill="#111827" opacity="0.3" />
    <ellipse cx="66" cy="112" rx="1.5" ry="1" fill="#111827" opacity="0.3" />
    <ellipse cx="70" cy="112" rx="1.5" ry="1" fill="#111827" opacity="0.3" />
  </g>

  <g class="baby-rabbit-head">
    <!-- Left Ear (shorter, stubbier) -->
    <ellipse class="baby-ear-left" cx="42" cy="30" rx="10" ry="24" fill="url(#baby-rabbit-gradient)" />
    <ellipse class="baby-ear-left" cx="42" cy="30" rx="5" ry="18" fill="#fecaca" opacity="0.4" />

    <!-- Right Ear (shorter, stubbier) -->
    <ellipse class="baby-ear-right" cx="78" cy="30" rx="10" ry="24" fill="url(#baby-rabbit-gradient)" />
    <ellipse class="baby-ear-right" cx="78" cy="30" rx="5" ry="18" fill="#fecaca" opacity="0.4" />

    <!-- Big Baby Head -->
    <ellipse cx="60" cy="55" rx="32" ry="30" fill="url(#baby-rabbit-gradient)" />

    <!-- Big Baby Eyes - round and sparkly -->
    <circle class="baby-eye" cx="48" cy="52" r="5" fill="#111827" />
    <circle class="baby-eye" cx="72" cy="52" r="5" fill="#111827" />
    <!-- Eye sparkles -->
    <circle class="baby-eye" cx="50" cy="50" r="1.8" fill="white" />
    <circle class="baby-eye" cx="74" cy="50" r="1.8" fill="white" />
    <circle class="baby-eye" cx="47" cy="53" r="0.8" fill="white" />
    <circle class="baby-eye" cx="71" cy="53" r="0.8" fill="white" />

    <!-- Blush cheeks -->
    <ellipse cx="38" cy="58" rx="6" ry="4" fill="url(#baby-blush)" opacity="0.5" />
    <ellipse cx="82" cy="58" rx="6" ry="4" fill="url(#baby-blush)" opacity="0.5" />

    <!-- Tiny nose -->
    <ellipse cx="60" cy="58" rx="2.5" ry="2" fill="#ea580c" opacity="0.6" />

    <!-- Small happy mouth -->
    <path d="M55 63 Q60 66 65 63" stroke="#111827" stroke-width="1.5" stroke-linecap="round" fill="none" />

    <!-- Tiny Whiskers -->
    <path d="M40 58 Q32 57 28 55" stroke="#374151" stroke-width="1" stroke-linecap="round" opacity="0.3" />
    <path d="M40 61 Q32 62 27 64" stroke="#374151" stroke-width="1" stroke-linecap="round" opacity="0.3" />
    <path d="M80 58 Q88 57 92 55" stroke="#374151" stroke-width="1" stroke-linecap="round" opacity="0.3" />
    <path d="M80 61 Q88 62 93 64" stroke="#374151" stroke-width="1" stroke-linecap="round" opacity="0.3" />

    <!-- Pacifier -->
    <circle cx="60" cy="69" r="4" fill="#93c5fd" stroke="#60a5fa" stroke-width="1" />
    <ellipse cx="60" cy="72" rx="6" ry="3.5" fill="#60a5fa" opacity="0.7" />
    <rect x="56" y="67" width="8" height="3" rx="1.5" fill="#93c5fd" />
  </g>
</svg>
